<div class="center">

  <div class="tabs">
    <select name="cat" id="cat" (change)="onChange($event.target.value)">
        <option value="movies"> Movies </option>
        <option value="tv"> TV </option>
    </select>
    <select name="year" id="year" (change)="onYearChange($event.target.value)" [value]="defaultYear">
        <option value="26"> 2026 </option>
        <option value="25"> 2025 </option>
        <option value="24"> 2024 </option>
        <option value="23"> 2023 </option>
        <option value="22"> 2022 </option>
        <option value="21"> 2021 </option>
        <option value="20"> 2020 </option>
        <option value="19"> 2019 </option>
        <option value="18"> 2018 </option>
        <option value="17"> 2017 </option>
        <option value="16"> 2016 </option>
        <option value="15"> 2015 </option>
    </select>
    <!-- <select name="provider" id="provider" (change)="onProviderChange($event.target.value)">
        <option value="npy"> Netflix </option>
        <option value="hha"> HBO </option>
        <option value="nkpkd"> Kids </option>
    </select> -->
  </div>
  <div class="mobile-genre-bar center" *ngIf="provider != 'nkpkd'">
    <button
      type="button"
      class="mobile-genre-trigger"
      [ngClass]="{'active': genre !== ''}"
      [attr.aria-expanded]="genreMenuOpen"
      (click)="toggleGenreMenu()">
      {{activeGenreLabel}}
    </button>
  </div>
  <div class="genres center kids" *ngIf="provider === 'nkpkd'">
  <span class="btn" [ngClass]="{'active': genre === '16'}" (click)="setGenre('16')">Animation</span> 
  <span class="btn" [ngClass]="{'active': genre === '10751'}" (click)="setGenre('10751')">Family</span> 
  </div> 
</div>

<div class="genre-sheet-backdrop" *ngIf="genreMenuOpen" (click)="closeGenreMenu()">
  <div class="genre-sheet" (click)="$event.stopPropagation()">
    <div class="genre-sheet-header">
      <span>Choose Genre</span>
      <button type="button" class="genre-sheet-close" (click)="closeGenreMenu()">Close</button>
    </div>
    <div class="genre-sheet-actions">
      <button
        type="button"
        class="genre-sheet-clear"
        [ngClass]="{'active': genre === ''}"
        (click)="clearGenre()">
        All genres
      </button>
    </div>
    <div class="genre-sheet-list">
      <button
        *ngFor="let option of genreOptions"
        type="button"
        class="genre-sheet-option"
        [ngClass]="{'active': genre === option.value}"
        (click)="setGenre(option.value)">
        {{option.label}}
      </button>
    </div>
  </div>
</div>

<div class="center load-msg" *ngIf="submitting">
    <span>{{ type === 'movies' ? 'Fetching Movies...' : 'Fetching TV Info...' }}</span>
</div>
<div class="center load-spin" *ngIf="submitting">
    <div class="lds-ring">
      <div></div>
      <div></div>
      <div></div>
      <div></div>
    </div>
</div>

<div class="content-inside" *ngIf="!submitting">

<div *ngIf="type === 'movies'">
  <app-slider 
  [title]="'netflix'" 
  [items]="netFlix" 
  [type]="type"
  [sliderType]="'slide1'"
  (open)="openTrailer($event.item)"></app-slider>
  <app-slider 
  [title]="'prime video'" 
  [items]="amazon" 
  [type]="type" 
  [sliderType]="'slide2'"
  (open)="openTrailer($event.item)"></app-slider>
  <app-slider 
  [title]="'disney+'" 
  [items]="disney" 
  [type]="type"
  [sliderType]="'slide3'"
  (open)="openTrailer($event.item)"></app-slider>
  
  <div *ngIf="hbo.length != 0 || hulu.length != 0">
    <app-slider 
    [title]="'max'" 
    [items]="hbo" 
    [type]="type"
    [sliderType]="'slide4'"
    (open)="openTrailer($event.item)"></app-slider>
    <app-slider 
    [title]="'hulu'" 
    [items]="hulu" 
    [type]="type" 
    [sliderType]="'slide5'"
    (open)="openTrailer($event.item)"></app-slider>
    <span *ngIf="apple.length != 0">
      <app-slider 
      [title]="'apple+'" 
      [items]="apple" 
      [type]="type"
      [sliderType]="'slide6'"
      (open)="openTrailer($event.item)"></app-slider>
    </span> 
  </div>
</div>

<div *ngIf="type === 'tv'">
  <app-slider 
  [title]="'netflix'" 
  [items]="netFlixTv" 
  [type]="type"
  [sliderType]="'slide1'"
  (open)="openTrailer($event.item)"></app-slider>
  <app-slider 
  [title]="'prime video'" 
  [items]="amazonTv" 
  [type]="type" 
  [sliderType]="'slide2'"
  (open)="openTrailer($event.item)"></app-slider>
  <app-slider 
  [title]="'disney+'" 
  [items]="disneyTv" 
  [type]="type"
  [sliderType]="'slide3'"
  (open)="openTrailer($event.item)"></app-slider>
  
  <div *ngIf="hboTv.length != 0">
    <app-slider 
    [title]="'hbo max'" 
    [items]="hboTv" 
    [type]="type"
    [sliderType]="'slide4'"
    (open)="openTrailer($event.item)"></app-slider>
    <app-slider 
    [title]="'hulu'" 
    [items]="huluTv" 
    [type]="type" 
    [sliderType]="'slide5'"
    (open)="openTrailer($event.item)"></app-slider>
    <span *ngIf="appleTv.length != 0">
      <app-slider 
      [title]="'apple+'" 
      [items]="appleTv" 
      [type]="type"
      [sliderType]="'slide6'"
      (open)="openTrailer($event.item)"></app-slider>
    </span> 
  </div>
</div>

<div class="center" *ngIf="provider === 'npy'">
  <span class="more-btn" (click)="onProviderChange('hha')">Load More 20{{year}} {{activeGenreLabel}}</span>
</div>

</div>
<div id="snackbar" [ngClass]="{'show' : util.showSnack}">{{util.reminderAlert}} <span *ngIf="util.reminderAlert === 'Reminder Added'"> &#10003;</span> </div>

<app-dialog
[isOpen]="isOpen"
[data]="related"
[title]="'Recommended'"
[type]="'something'"
[showTitles]="''"
[content]="type"
[loading]="loading"
[loadingTitle]="'Recommended'"
[selectedMovie]="selectedMovie"
[selected]="selected"
[selectedTV]="''"
[dialogUrl]="dialogUrl"
[trailerUrl]="trailerUrl"
[trailerUrlTV]="''"
[showTrailer]="showTrailer"
(close)="isOpen = false; showTrailer = false"></app-dialog>
